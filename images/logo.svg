<svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" stroke="#1a5f57" stroke-width="2"/>

  <!-- Leaf Shape (Modern & Eco) -->
  <path d="M50 20 C35 20, 28 32, 28 45 C28 58, 35 68, 50 80 C65 68, 72 58, 72 45 C72 32, 65 20, 50 20 Z" 
        fill="white" opacity="0.95"/>

  <!-- Wallet Lines (Clean & Minimal) -->
  <rect x="35" y="40" width="30" height="18" rx="3" fill="#2a9d8f"/>
  <rect x="38" y="43" width="24" height="3" rx="1.5" fill="white"/>
  <rect x="38" y="49" width="24" height="3" rx="1.5" fill="white"/>
  <rect x="38" y="55" height="3" width="18" rx="1.5" fill="white"/>

  <!-- Glowing Dot (Premium Touch) -->
  <circle cx="50" cy="48" r="4" fill="#4ecdc4">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Gradient -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a9d8f"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>

  <!-- Hover Glow (Optional - Add in CSS) -->
</svg>